name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          [ -n "${{ secrets.EC2_HOST }}" ] || (echo "Missing EC2_HOST"; exit 1)
          [ -n "${{ secrets.EC2_USER }}" ] || (echo "Missing EC2_USER"; exit 1)
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || (echo "Missing EC2_SSH_KEY"; exit 1)

      - name: Create deploy bundle (exclude .git)
        run: |
          tar -czf release.tar.gz \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.next \
            .

      - name: Upload bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "release.tar.gz"
          target: "/home/ubuntu/cipherdocs"
          overwrite: true

      - name: Extract, install and restart app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Node 22 (required by your project)
            export NVM_DIR="$HOME/.nvm"
            if [ ! -s "$NVM_DIR/nvm.sh" ]; then
              curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            fi
            . "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm alias default 22
            nvm use 22

            node -v
            npm -v

            command -v pm2 >/dev/null 2>&1 || npm install -g pm2

            mkdir -p /home/ubuntu/cipherdocs
            cd /home/ubuntu/cipherdocs

            # Keep only .env, release bundle; remove old app files
            find . -mindepth 1 -maxdepth 1 ! -name ".env" ! -name "release.tar.gz" -exec rm -rf {} +

            tar -xzf release.tar.gz
            rm -f release.tar.gz
            rm -rf .git

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            npm run build --if-present

            pm2 describe cipherdocs >/dev/null 2>&1 \
              && pm2 restart cipherdocs --update-env \
              || pm2 start npm --name cipherdocs -- start

            pm2 save
