name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          [ -n "${{ secrets.EC2_HOST }}" ] || (echo "Missing EC2_HOST"; exit 1)
          [ -n "${{ secrets.EC2_USER }}" ] || (echo "Missing EC2_USER"; exit 1)
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || (echo "Missing EC2_SSH_KEY"; exit 1)

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/cipherdocs"
          rm: false
          overwrite: true

      - name: Install dependencies and restart app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /home/ubuntu/cipherdocs
            cd /home/ubuntu/cipherdocs

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            npm run build --if-present

            pm2 describe cipherdocs >/dev/null 2>&1 \
              && pm2 restart cipherdocs \
              || pm2 start npm --name cipherdocs -- start

            pm2 save
