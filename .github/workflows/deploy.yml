name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          [ -n "${{ secrets.EC2_HOST }}" ] || (echo "Missing EC2_HOST"; exit 1)
          [ -n "${{ secrets.EC2_USER }}" ] || (echo "Missing EC2_USER"; exit 1)
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || (echo "Missing EC2_SSH_KEY"; exit 1)

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/cipherdocs"
          rm: false
          overwrite: true

      - name: Install dependencies and restart app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Ensure Node 22 is available (required by this project)
            export NVM_DIR="$HOME/.nvm"
            if [ ! -s "$NVM_DIR/nvm.sh" ]; then
              curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
            fi
            . "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm alias default 22
            nvm use 22

            node -v
            npm -v

            # Ensure pm2 exists for this Node version
            command -v pm2 >/dev/null 2>&1 || npm install -g pm2

            mkdir -p /home/ubuntu/cipherdocs
            cd /home/ubuntu/cipherdocs

            rm -rf node_modules

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            npm run build --if-present

            pm2 describe cipherdocs >/dev/null 2>&1 \
              && pm2 restart cipherdocs --update-env \
              || pm2 start npm --name cipherdocs -- start

            pm2 save
